server:
  port: 8080

spring:
  application:
    name: grain-scale

  datasource:
    url: jdbc:h2:mem:grainscale
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

# Configurações do algoritmo de estabilização
weighing:
  window-duration-ms: 3000       # Janela mínima de 3 segundos
  variance-threshold: 50.0       # Variância máxima (kg²) para considerar estável
  escape-check-interval-ms: 500  # Intervalo para checar fuga prematura
  idle-timeout-ms: 500           # Sem leitura por 500ms = caminhão saiu
